<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SUMMER SONIC 2026 予習プレイヤー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink:        #070A14;
  --panel:      #0E1322;
  --panel-2:    #161D31;
  --line:       rgba(255,255,255,.10);
  --line-soft:  rgba(255,255,255,.06);
  --text:       #EDF1FA;
  --dim:        #8892AB;

  --accent:     #FF6A3D;
  --accent-ink: #1A0A04;

  --radius:     14px;
  --radius-sm:  9px;
  --player-h:   74px;

  --font-display: 'Anton', 'Zen Kaku Gothic New', sans-serif;
  --font-body:    'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  --font-mono:    'DM Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
body[data-day="DAY1"] { --accent: #FF6A3D; --accent-ink: #200A03; }
body[data-day="DAY2"] { --accent: #4FB8FF; --accent-ink: #04121F; }
body[data-day="DAY3"] { --accent: #FFC94B; --accent-ink: #201704; }

* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--ink);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  padding-bottom: calc(var(--player-h) + env(safe-area-inset-bottom, 0px) + 12px);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0 0 auto 0;
  height: 340px;
  background: radial-gradient(120% 100% at 50% 0%, color-mix(in srgb, var(--accent) 26%, transparent) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  transition: background .5s ease;
}
.wrap { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 0 16px; }
button, select, input { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

/* ---------- ヘッダー ---------- */
.masthead { padding: 26px 0 8px; }
.wordmark {
  font-family: var(--font-display);
  font-size: clamp(30px, 8.5vw, 56px);
  line-height: .95;
  letter-spacing: .01em;
  text-transform: uppercase;
}
.wordmark em { font-style: normal; color: var(--accent); transition: color .4s ease; }
.tagline {
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: .16em;
  color: var(--dim);
  text-transform: uppercase;
}
.venue-switch {
  display: inline-flex;
  margin-top: 18px;
  padding: 3px;
  gap: 3px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 999px;
}
.venue-switch button {
  padding: 8px 20px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: .1em;
  color: var(--dim);
  min-height: 38px;
}
.venue-switch button[aria-pressed="true"] { background: var(--text); color: var(--ink); font-weight: 500; }

/* ---------- 日付タブ（半券） ---------- */
.daystrip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 16px 0 20px; }
.daytab {
  position: relative;
  padding: 12px 10px 13px;
  text-align: left;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: background .2s, border-color .2s, transform .12s;
}
.daytab::after {
  content: '';
  position: absolute;
  right: 26px; top: -4px; bottom: -4px;
  width: 1px;
  background-image: radial-gradient(circle, rgba(255,255,255,.28) 1px, transparent 1.2px);
  background-size: 2px 7px;
  opacity: .5;
}
.daytab:active { transform: scale(.985); }
.daytab .d-no { display: block; font-family: var(--font-display); font-size: 20px; line-height: 1.1; letter-spacing: .02em; }
.daytab .d-date { display: block; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .08em; color: var(--dim); margin-top: 2px; }
.daytab[aria-selected="true"] { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.daytab[aria-selected="true"] .d-date { color: var(--accent-ink); opacity: .72; }
.daytab[aria-selected="true"]::after { background-image: radial-gradient(circle, rgba(0,0,0,.35) 1px, transparent 1.2px); }

/* ---------- 操作バー ---------- */
.actionbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
.btn-primary {
  flex: 1 1 220px;
  min-height: 50px;
  padding: 0 18px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: var(--accent-ink);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: .02em;
  transition: filter .15s, transform .12s;
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active { transform: scale(.99); }
.btn-ghost {
  min-height: 50px;
  padding: 0 16px;
  border-radius: var(--radius-sm);
  background: var(--panel);
  border: 1px solid var(--line);
  color: var(--text);
  font-size: 14px;
}
.btn-ghost[aria-pressed="true"] { border-color: var(--accent); color: var(--accent); }
.volume-wrap {
  display: flex; align-items: center; gap: 8px;
  min-height: 50px; padding: 0 14px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 11px; color: var(--dim);
}
input[type="range"] { width: 92px; accent-color: var(--accent); }

/* ---------- 通知バナー ---------- */
.notice {
  display: none;
  margin: 0 0 14px;
  padding: 12px 14px;
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--accent) 12%, var(--panel));
  font-size: 13px;
  line-height: 1.9;
}
.notice.is-on { display: block; }
.notice b { color: var(--accent); }

/* ---------- 検索・絞り込み ---------- */
.searchrow { display: flex; gap: 8px; margin-bottom: 10px; }
.searchrow input[type="search"] {
  flex: 1;
  min-height: 46px;
  padding: 0 14px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--text);
}
.searchrow input[type="search"]::placeholder { color: var(--dim); }
.filters, .filter-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.chip {
  padding: 7px 13px;
  min-height: 36px;
  border-radius: 999px;
  background: var(--panel);
  border: 1px solid var(--line);
  color: var(--dim);
  font-size: 12.5px;
  transition: color .15s, border-color .15s, background .15s;
}
.chip[aria-pressed="true"] { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); font-weight: 500; }
.filter-label {
  align-self: center;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .14em;
  color: var(--dim);
  text-transform: uppercase;
  margin-right: 2px;
}
.resultline {
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: .08em;
  color: var(--dim);
  margin: 14px 0 10px;
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.linkish { color: var(--dim); text-decoration: underline; text-underline-offset: 3px; font-size: 11.5px; background: none; }
.linkish:hover { color: var(--text); }

/* ---------- カード ---------- */
.grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
@media (min-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1040px) { .grid { grid-template-columns: repeat(3, 1fr); } }
.card {
  position: relative;
  display: flex;
  flex-direction: column;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .2s, background .2s;
}
.card.is-playing { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 9%, var(--panel)); }
.card.is-playing::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
.card-head { display: flex; gap: 12px; padding: 12px; }
.thumb { flex: 0 0 68px; width: 68px; height: 68px; border-radius: 8px; background: var(--panel-2); object-fit: cover; display: block; }
.thumb-fallback {
  flex: 0 0 68px; width: 68px; height: 68px;
  border-radius: 8px;
  background: var(--panel-2);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--dim);
}
.card-meta { min-width: 0; flex: 1; }
.artist-name { font-size: 16px; font-weight: 700; line-height: 1.35; letter-spacing: .01em; word-break: break-word; }
.slot { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .07em; color: var(--dim); margin-top: 3px; text-transform: uppercase; }
.genres { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
.genre {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: .1em;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid var(--line);
  color: var(--dim);
}
.songs { border-top: 1px solid var(--line-soft); }
.song {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  min-height: 48px;
  text-align: left;
  border-bottom: 1px solid var(--line-soft);
  transition: background .15s;
}
.song:hover { background: rgba(255,255,255,.035); }
.song:last-child { border-bottom: none; }
.song.hidden { display: none; }
.song.is-current .song-title { color: var(--accent); font-weight: 700; }
.song.is-dead .song-title { color: var(--dim); }
.song-icon {
  flex: 0 0 26px; width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 50%;
  border: 1px solid var(--line);
  font-size: 10px;
  color: var(--text);
}
.song.is-current .song-icon { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.song-title { flex: 1; min-width: 0; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-note { font-family: var(--font-mono); font-size: 10px; color: var(--dim); flex: 0 0 auto; }
.more-songs {
  width: 100%;
  padding: 9px;
  min-height: 40px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .1em;
  color: var(--dim);
  border-top: 1px solid var(--line-soft);
}
.more-songs:hover { color: var(--text); }
.card-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 10px;
  border-top: 1px solid var(--line-soft);
  background: rgba(0,0,0,.18);
}
.fav {
  min-height: 38px; padding: 0 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  font-size: 13px; color: var(--dim);
  white-space: nowrap;
}
.fav[aria-pressed="true"] { color: var(--accent); border-color: var(--accent); }
.status-select {
  flex: 1; min-width: 0;
  min-height: 38px;
  padding: 0 26px 0 8px;
  border-radius: var(--radius-sm);
  background: var(--panel-2);
  border: 1px solid var(--line);
  font-size: 12.5px;
  color: var(--text);
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--dim) 50%), linear-gradient(135deg, var(--dim) 50%, transparent 50%);
  background-position: calc(100% - 15px) 17px, calc(100% - 11px) 17px;
  background-size: 4px 4px, 4px 4px;
  background-repeat: no-repeat;
}
.status-select[data-v="当日観たい"], .status-select[data-v="優先度高"] { border-color: var(--accent); color: var(--accent); }
.ext {
  min-height: 38px; min-width: 38px;
  display: grid; place-items: center;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  color: var(--dim);
  font-size: 13px;
  text-decoration: none;
}
.ext:hover { color: var(--text); border-color: var(--text); }
.empty {
  padding: 44px 16px;
  text-align: center;
  color: var(--dim);
  border: 1px dashed var(--line);
  border-radius: var(--radius);
}
.empty strong { display: block; color: var(--text); margin-bottom: 6px; font-size: 15px; }

/* ---------- ミニプレイヤー ---------- */
.miniplayer {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 40;
  background: rgba(10,14,26,.94);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  transform: translateY(110%);
  transition: transform .28s cubic-bezier(.2,.8,.3,1);
}
.miniplayer.is-open { transform: translateY(0); }
.progress { height: 2px; background: rgba(255,255,255,.10); }
.progress span { display: block; height: 100%; width: 0%; background: var(--accent); transition: width .2s linear; }
.mini-inner {
  display: flex; align-items: center; gap: 10px;
  height: calc(var(--player-h) - 2px);
  max-width: 1120px; margin: 0 auto; padding: 0 12px;
}
.mini-thumb { width: 46px; height: 46px; border-radius: 7px; object-fit: cover; background: var(--panel-2); flex: 0 0 46px; }
.mini-text { flex: 1; min-width: 0; }
.mini-artist { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-song { font-family: var(--font-mono); font-size: 10.5px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-controls { display: flex; align-items: center; gap: 2px; flex: 0 0 auto; }
.mini-controls button {
  width: 44px; height: 44px;
  display: grid; place-items: center;
  border-radius: 50%;
  color: var(--text);
  font-size: 15px;
}
.mini-controls button:hover { background: rgba(255,255,255,.07); }
.mini-controls .play { background: var(--accent); color: var(--accent-ink); font-size: 16px; }
.mini-controls .play:hover { filter: brightness(1.08); }
.mini-controls .close { color: var(--dim); font-size: 13px; }

.toast {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: calc(var(--player-h) + env(safe-area-inset-bottom, 0px) + 14px);
  z-index: 60;
  padding: 9px 16px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12.5px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
  max-width: calc(100vw - 32px);
  text-align: center;
}
.toast.is-on { opacity: 1; }

footer {
  margin: 40px 0 10px;
  padding-top: 18px;
  border-top: 1px solid var(--line-soft);
  font-family: var(--font-mono);
  font-size: 10.5px;
  line-height: 2;
  letter-spacing: .05em;
  color: var(--dim);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}
</style>
</head>
<body data-day="DAY1">
<div class="wrap">

  <header class="masthead">
    <h1 class="wordmark">SUMMER SONIC <em>2026</em></h1>
    <p class="tagline">Preview Player — 8/14 fri · 8/15 sat · 8/16 sun</p>
    <div class="venue-switch" id="venueSwitch" role="group" aria-label="会場">
      <button data-venue="TOKYO" aria-pressed="true">TOKYO</button>
      <button data-venue="OSAKA" aria-pressed="false">OSAKA</button>
    </div>
  </header>

  <nav class="daystrip" id="daystrip" role="tablist" aria-label="日付"></nav>

  <div class="notice" id="envNote"></div>

  <div class="actionbar">
    <button class="btn-primary" id="playAll">▶ 連続再生</button>
    <button class="btn-ghost" id="shuffleBtn" aria-pressed="false">⤮ シャッフル</button>
    <label class="volume-wrap">VOL
      <input type="range" id="volume" min="0" max="1" step="0.05" value="0.85" aria-label="音量">
    </label>
  </div>

  <div class="searchrow">
    <input type="search" id="search" placeholder="アーティスト名・曲名で検索" aria-label="検索">
  </div>

  <div class="filter-group" id="viewFilter">
    <span class="filter-label">View</span>
    <button class="chip" data-view="all" aria-pressed="true">すべて</button>
    <button class="chip" data-view="fav" aria-pressed="false">★ 気になる</button>
    <button class="chip" data-view="unheard" aria-pressed="false">未聴のみ</button>
    <button class="chip" data-view="wanted" aria-pressed="false">当日観たい</button>
  </div>
  <div class="filter-group" id="stageFilter"></div>
  <div class="filter-group" id="genreFilter"></div>

  <div class="resultline">
    <span id="resultCount"></span>
    <button class="linkish" id="resetFilters">絞り込みをリセット</button>
  </div>

  <main class="grid" id="grid" aria-live="polite"></main>

  <footer>
    試聴音源は iTunes Search API の30秒プレビューを使用。Apple Music のライブラリやプレイリストには一切追加されません。<br>
    出演情報は 2026/7/24 時点の公式発表から主要アーティストを抜粋したものです。最新のタイムテーブルは公式サイト（summersonic.com）でご確認ください。
  </footer>

</div>

<div class="miniplayer" id="miniplayer">
  <div class="progress"><span id="pBar"></span></div>
  <div class="mini-inner">
    <img class="mini-thumb" id="pThumb" alt="" referrerpolicy="no-referrer">
    <div class="mini-text">
      <div class="mini-artist" id="pArtist"></div>
      <div class="mini-song" id="pSong"></div>
    </div>
    <div class="mini-controls">
      <button id="pPrev" aria-label="前の曲">⏮</button>
      <button class="play" id="pPlay" aria-label="再生・一時停止">▶</button>
      <button id="pNext" aria-label="次の曲">⏭</button>
      <button class="close" id="pClose" aria-label="プレイヤーを閉じる">✕</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(() => {
'use strict';

/* =========================================================
   SUMMER SONIC 2026 予習プレイヤー（単一ファイル版）
   - Apple Music のライブラリには一切追加しません
   - iTunes Search API の30秒試聴だけを再生します
   - 保存はメモリ上のみ（この画面を開いている間だけ保持）
   ========================================================= */

const CACHE_TTL_NEG = 1000 * 60 * 30;
const STATUSES = ['未聴', '試聴済み', '当日観たい', '優先度高', '見送る'];
const GAP_MS = 900;

/* この環境ではlocalStorageが使えないため、メモリ上に保持する */
const mem = Object.create(null);
const store = {
  get(k, fallback) { return (k in mem) ? mem[k] : fallback; },
  set(k, v) { mem[k] = v; },
};

const state = {
  artists: [],
  venue: 'TOKYO',
  day: 'DAY1',
  q: '',
  stages: new Set(),
  genres: new Set(),
  view: 'all',
  expanded: new Set(),
  fav: new Set(),
  status: {},
  volume: 0.85,
  shuffle: false,
  queue: [],
  qi: -1,
  playing: false,
  continuous: false,
  audio: null,
  markTimer: null,
  netBlocked: false,
};

const $ = (s) => document.querySelector(s);
const el = {
  venueSwitch: $('#venueSwitch'),
  daystrip:    $('#daystrip'),
  playAll:     $('#playAll'),
  shuffle:     $('#shuffleBtn'),
  volume:      $('#volume'),
  search:      $('#search'),
  stageFilter: $('#stageFilter'),
  genreFilter: $('#genreFilter'),
  viewFilter:  $('#viewFilter'),
  resultCount: $('#resultCount'),
  resetBtn:    $('#resetFilters'),
  grid:        $('#grid'),
  player:      $('#miniplayer'),
  pThumb:      $('#pThumb'),
  pArtist:     $('#pArtist'),
  pSong:       $('#pSong'),
  pPlay:       $('#pPlay'),
  pBar:        $('#pBar'),
  toast:       $('#toast'),
  envNote:     $('#envNote'),
};

const esc = (s) => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

function norm(s) {
  return String(s || '')
    .normalize('NFKC')
    .toLowerCase()
    .replace(/[（(\[].*?[)）\]]/g, ' ')
    .replace(/\b(feat\.?|featuring|ft\.?|with)\b/g, ' ')
    .replace(/&/g, 'and')
    .replace(/[^\p{L}\p{N}]+/gu, '');
}

let toastTimer = null;
function toast(msg) {
  el.toast.textContent = msg;
  el.toast.classList.add('is-on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.toast.classList.remove('is-on'), 2800);
}

const dayLabel = { DAY1: '08/14 FRI', DAY2: '08/15 SAT', DAY3: '08/16 SUN' };

/* ---------------- iTunes Search API ---------------- */
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'ssjsonp_' + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    let done = false;
    const cleanup = () => {
      done = true;
      clearTimeout(timer);
      try { delete window[cb]; } catch (e) { window[cb] = undefined; }
      s.remove();
    };
    const timer = setTimeout(() => { if (!done) { cleanup(); reject(new Error('timeout')); } }, 9000);
    window[cb] = (data) => { if (!done) { cleanup(); resolve(data); } };
    s.onerror = () => { if (!done) { cleanup(); reject(new Error('network')); } };
    s.src = url + '&callback=' + cb;
    document.head.appendChild(s);
  });
}

async function itunesSearch(term) {
  const url = 'https://itunes.apple.com/search?term=' + encodeURIComponent(term) +
              '&entity=song&limit=12&country=JP&media=music';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    return await res.json();
  } catch (e) {
    return await jsonp(url);
  }
}

function pickBest(results, song, artistName) {
  const wantTitle = norm(song.title);
  let wantArtist = norm(String(song.searchTerm || '').replace(song.title, ''));
  if (!wantArtist) wantArtist = norm(artistName);

  const ok = (a, b) => a && b && (a.includes(b) || b.includes(a));
  const usable = (r) => r && r.wrapperType === 'track' && r.kind === 'song' && r.previewUrl;

  const strict = results.find((r) =>
    usable(r) && ok(norm(r.trackName), wantTitle) && ok(norm(r.artistName), wantArtist));
  if (strict) return strict;

  const byArtist = results.find((r) => usable(r) && ok(norm(r.artistName), wantArtist));
  if (byArtist && ok(norm(byArtist.trackName), wantTitle)) return byArtist;

  return null;
}

/* 戻り値: {previewUrl,...} / null=見つからず / 'blocked'=通信不可 */
async function resolvePreview(entry, song) {
  if (song.previewUrl) return { previewUrl: song.previewUrl };

  const key = 'pv:' + song.searchTerm;
  const hit = store.get(key, null);
  if (hit) {
    if (hit.previewUrl) return hit;
    if (Date.now() - hit.ts < CACHE_TTL_NEG) return null;
  }

  let found = null;
  try {
    const data = await itunesSearch(song.searchTerm);
    found = pickBest(data && data.results ? data.results : [], song, entry.artist);
  } catch (e) {
    return 'blocked';
  }

  const rec = found
    ? { previewUrl: found.previewUrl, trackViewUrl: found.trackViewUrl || '', ts: Date.now() }
    : { previewUrl: null, ts: Date.now() };
  store.set(key, rec);
  return found ? rec : null;
}

function showBlockedNote() {
  if (state.netBlocked) return;
  state.netBlocked = true;
  el.envNote.innerHTML =
    '<b>この表示環境では試聴APIに接続できないため、音声を再生できません。</b><br>' +
    '右上のダウンロードからこのHTMLを保存し、SafariやChromeで開くと、この画面のまま試聴・連続再生ができます。' +
    '各カードの ♫（Apple Music）と ▶（YouTube）リンクからも曲を確認できます。';
  el.envNote.classList.add('is-on');
}

/* ---------------- 絞り込み ---------------- */
function visibleList() {
  const q = norm(state.q);
  return state.artists.filter((a) => {
    if (a.venue !== state.venue || a.day !== state.day) return false;
    if (state.stages.size && !state.stages.has(a.stage)) return false;
    if (state.genres.size && !a.genre.some((g) => state.genres.has(g))) return false;
    const st = state.status[a.id] || '未聴';
    if (state.view === 'fav' && !state.fav.has(a.id)) return false;
    if (state.view === 'unheard' && st !== '未聴') return false;
    if (state.view === 'wanted' && st !== '当日観たい' && st !== '優先度高') return false;
    if (q && !norm(a.artist + a.stage + a.songs.map((s) => s.title).join('')).includes(q)) return false;
    return true;
  });
}

/* ---------------- 描画 ---------------- */
function renderVenueAndDays() {
  el.venueSwitch.querySelectorAll('button').forEach((b) => {
    b.setAttribute('aria-pressed', String(b.dataset.venue === state.venue));
  });
  el.daystrip.querySelectorAll('.daytab').forEach((b) => {
    b.setAttribute('aria-selected', String(b.dataset.day === state.day));
  });
  document.body.dataset.day = state.day;
}

function renderFilterChips() {
  const pool = state.artists.filter((a) => a.venue === state.venue && a.day === state.day);

  const stages = [...new Set(pool.map((a) => a.stage))];
  el.stageFilter.innerHTML = '<span class="filter-label">Stage</span>' + stages.map((s) =>
    '<button class="chip" data-stage="' + esc(s) + '" aria-pressed="' + state.stages.has(s) + '">' +
    esc(s.replace(/ STAGE$/, '')) + '</button>').join('');

  const genres = [...new Set(pool.flatMap((a) => a.genre))].sort();
  el.genreFilter.innerHTML = '<span class="filter-label">Genre</span>' + genres.map((g) =>
    '<button class="chip" data-genre="' + esc(g) + '" aria-pressed="' + state.genres.has(g) + '">' +
    esc(g) + '</button>').join('');

  el.viewFilter.querySelectorAll('[data-view]').forEach((b) => {
    b.setAttribute('aria-pressed', String(b.dataset.view === state.view));
  });
}

function cardHTML(a) {
  const open = state.expanded.has(a.id);
  const isFav = state.fav.has(a.id);
  const st = state.status[a.id] || '未聴';
  const cur = state.queue[state.qi];
  const playingHere = state.playing && cur && cur.id === a.id;

  const songs = a.songs.map((s, i) => {
    const hidden = i > 0 && !open ? ' hidden' : '';
    const isCur = playingHere && cur.songIndex === i ? ' is-current' : '';
    const dead = s._dead ? ' is-dead' : '';
    const note = s._dead ? '試聴なし' : '';
    return '<button class="song' + hidden + isCur + dead + '" data-play="' + esc(a.id) + '" data-song="' + i + '">' +
      '<span class="song-icon" aria-hidden="true">' + (isCur ? '❚❚' : '▶') + '</span>' +
      '<span class="song-title">' + esc(s.title) + '</span>' +
      '<span class="song-note">' + note + '</span></button>';
  }).join('');

  const moreBtn = a.songs.length > 1
    ? '<button class="more-songs" data-more="' + esc(a.id) + '">' +
      (open ? '閉じる' : 'もっと聴く（あと' + (a.songs.length - 1) + '曲）') + '</button>'
    : '';

  const q = encodeURIComponent(a.artist);
  const appleUrl = a.appleMusicUrl || ('https://music.apple.com/jp/search?term=' + q);
  const ytUrl = 'https://www.youtube.com/results?search_query=' + q;

  const img = a.image
    ? '<img class="thumb" src="' + esc(a.image) + '" alt="" loading="lazy" referrerpolicy="no-referrer" data-fb="' + esc(a.artist.slice(0, 1)) + '">'
    : '<div class="thumb-fallback">' + esc(a.artist.slice(0, 1)) + '</div>';

  return '<article class="card' + (playingHere ? ' is-playing' : '') + '" id="card-' + esc(a.id) + '">' +
    '<div class="card-head">' + img +
      '<div class="card-meta">' +
        '<h2 class="artist-name">' + esc(a.artist) + '</h2>' +
        '<p class="slot">' + esc(a.stage) + ' ／ ' + (a.time ? esc(a.time) : '時間未発表') + '</p>' +
        '<div class="genres">' + a.genre.map((g) => '<span class="genre">' + esc(g) + '</span>').join('') + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="songs">' + songs + '</div>' + moreBtn +
    '<div class="card-foot">' +
      '<button class="fav" data-fav="' + esc(a.id) + '" aria-pressed="' + isFav + '">' + (isFav ? '★' : '☆') + ' 気になる</button>' +
      '<select class="status-select" data-status="' + esc(a.id) + '" data-v="' + esc(st) + '" aria-label="' + esc(a.artist) + 'の予習状況">' +
        STATUSES.map((s) => '<option' + (s === st ? ' selected' : '') + '>' + s + '</option>').join('') +
      '</select>' +
      '<a class="ext" href="' + esc(appleUrl) + '" target="_blank" rel="noopener" title="Apple Musicで開く">♫</a>' +
      '<a class="ext" href="' + esc(ytUrl) + '" target="_blank" rel="noopener" title="YouTubeで検索">▶</a>' +
    '</div></article>';
}

function render() {
  renderVenueAndDays();
  renderFilterChips();

  const list = visibleList();
  const total = state.artists.filter((a) => a.venue === state.venue && a.day === state.day).length;
  el.resultCount.textContent = list.length + ' / ' + total + ' 組';
  el.playAll.textContent = state.continuous
    ? '■ 連続再生を停止'
    : '▶ ' + state.day + ' を連続再生（' + list.length + '組）';

  el.grid.innerHTML = list.length
    ? list.map(cardHTML).join('')
    : '<div class="empty"><strong>条件に合うアーティストがいません</strong>絞り込みを外すか、別の日付を選んでください。</div>';

  el.grid.querySelectorAll('img.thumb').forEach((img) => {
    img.addEventListener('error', () => {
      const d = document.createElement('div');
      d.className = 'thumb-fallback';
      d.textContent = img.dataset.fb || '♪';
      img.replaceWith(d);
    }, { once: true });
  });
}

function refreshPlayingUI() {
  const cur = state.queue[state.qi];
  document.querySelectorAll('.card').forEach((c) => c.classList.remove('is-playing'));
  document.querySelectorAll('.song').forEach((s) => {
    s.classList.remove('is-current');
    const icon = s.querySelector('.song-icon');
    if (icon) icon.textContent = '▶';
  });
  if (!cur) return;
  const card = document.getElementById('card-' + cur.id);
  if (card) {
    card.classList.add('is-playing');
    const song = card.querySelector('[data-song="' + cur.songIndex + '"]');
    if (song) {
      song.classList.add('is-current');
      const icon = song.querySelector('.song-icon');
      if (icon) icon.textContent = state.playing ? '❚❚' : '▶';
    }
  }
}

/* ---------------- プレイヤー ---------------- */
function audio() {
  if (state.audio) return state.audio;
  const a = new Audio();
  a.preload = 'none';
  a.volume = state.volume;
  a.addEventListener('timeupdate', () => {
    const cur = state.queue[state.qi];
    if (!cur || !state.playing) return;
    const song = cur.entry.songs[cur.songIndex];
    const end = Math.min(song.endTime || 30, isFinite(a.duration) && a.duration ? a.duration : 30);
    const start = song.startTime || 0;
    const pct = Math.max(0, Math.min(100, ((a.currentTime - start) / Math.max(1, end - start)) * 100));
    el.pBar.style.width = pct + '%';
    if (a.currentTime >= end) { a.pause(); onSongEnd(); }
  });
  a.addEventListener('ended', () => { if (state.playing) onSongEnd(); });
  a.addEventListener('error', () => {
    const cur = state.queue[state.qi];
    if (!cur || !a.src) return;
    cur.entry.songs[cur.songIndex]._dead = true;
    toast('この曲は再生できませんでした');
    if (state.continuous) onSongEnd(); else pauseUI();
  });
  state.audio = a;
  return a;
}

function pauseUI() {
  state.playing = false;
  el.pPlay.textContent = '▶';
  refreshPlayingUI();
}

function onSongEnd() {
  if (state.continuous) {
    if (state.qi + 1 >= state.queue.length) { stop(); toast('この日の予習はここまでです'); return; }
    state.playing = false;
    setTimeout(() => playAt(state.qi + 1), GAP_MS);
  } else {
    el.pBar.style.width = '100%';
    pauseUI();
  }
}

function buildQueue(startId, startSongIndex) {
  const list = visibleList();
  let q = [];
  list.forEach((entry) => {
    const n = state.expanded.has(entry.id) ? entry.songs.length : 1;
    for (let i = 0; i < n; i++) q.push({ id: entry.id, songIndex: i, entry });
  });
  if (state.shuffle) {
    for (let i = q.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = q[i]; q[i] = q[j]; q[j] = t;
    }
  }
  if (startId != null) {
    const idx = q.findIndex((x) => x.id === startId && x.songIndex === startSongIndex);
    if (idx >= 0) {
      q = state.shuffle
        ? [q[idx]].concat(q.filter((_, i) => i !== idx))
        : q.slice(idx).concat(q.slice(0, idx));
    } else {
      const entry = state.artists.find((a) => a.id === startId);
      if (entry) q = [{ id: startId, songIndex: startSongIndex, entry }].concat(q);
    }
  }
  state.queue = q;
  state.qi = -1;
}

async function playAt(index) {
  if (index < 0 || index >= state.queue.length) { stop(); return; }
  state.qi = index;
  const cur = state.queue[index];
  const entry = cur.entry;
  const song = entry.songs[cur.songIndex];

  openPlayer(entry, '読み込み中…');
  refreshPlayingUI();

  const res = await resolvePreview(entry, song);
  if (state.qi !== index) return;

  if (res === 'blocked') {
    showBlockedNote();
    state.continuous = false;
    el.pSong.textContent = '試聴APIに接続できません';
    pauseUI();
    render();
    return;
  }

  if (!res || !res.previewUrl) {
    song._dead = true;
    el.pSong.textContent = '試聴音源が見つかりませんでした';
    const card = document.getElementById('card-' + entry.id);
    const node = card && card.querySelector('[data-song="' + cur.songIndex + '"]');
    if (node) { node.classList.add('is-dead'); node.querySelector('.song-note').textContent = '試聴なし'; }
    if (state.continuous) setTimeout(() => { if (state.qi === index) onSongEnd(); }, 500);
    else toast('試聴音源が見つかりませんでした。♫ / ▶ のリンクから確認できます');
    return;
  }

  const a = audio();
  a.src = res.previewUrl;
  try {
    await a.play();
    if (song.startTime) { try { a.currentTime = song.startTime; } catch (e) {} }
    state.playing = true;
    el.pSong.textContent = song.title;
    el.pPlay.textContent = '❚❚';
    el.pBar.style.width = '0%';
    refreshPlayingUI();
    markHeard(entry.id);
  } catch (e) {
    pauseUI();
    toast('再生を開始できませんでした。もう一度タップしてください');
  }
}

function markHeard(id) {
  clearTimeout(state.markTimer);
  state.markTimer = setTimeout(() => {
    if (!state.status[id] || state.status[id] === '未聴') {
      state.status[id] = '試聴済み';
      const sel = document.querySelector('[data-status="' + (window.CSS && CSS.escape ? CSS.escape(id) : id) + '"]');
      if (sel) { sel.value = '試聴済み'; sel.dataset.v = '試聴済み'; }
    }
  }, 3500);
}

function next() {
  if (state.qi + 1 >= state.queue.length) { toast('最後の曲です'); return; }
  playAt(state.qi + 1);
}
function prev() { playAt(Math.max(0, state.qi - 1)); }

function togglePlay() {
  const a = audio();
  if (!state.queue.length) return;
  if (state.playing) {
    a.pause(); state.playing = false; el.pPlay.textContent = '▶';
  } else if (a.src) {
    a.play().then(() => { state.playing = true; el.pPlay.textContent = '❚❚'; refreshPlayingUI(); }).catch(() => {});
  } else {
    playAt(Math.max(0, state.qi));
  }
  refreshPlayingUI();
}

function stop() {
  if (state.audio) { state.audio.pause(); state.audio.removeAttribute('src'); }
  state.playing = false;
  state.continuous = false;
  state.qi = -1;
  el.pPlay.textContent = '▶';
  el.pBar.style.width = '0%';
  el.player.classList.remove('is-open');
  refreshPlayingUI();
  render();
}

function openPlayer(entry, note) {
  el.player.classList.add('is-open');
  el.pArtist.textContent = entry.artist;
  el.pSong.textContent = note;
  if (entry.image) { el.pThumb.src = entry.image; el.pThumb.style.visibility = 'visible'; }
  else { el.pThumb.removeAttribute('src'); el.pThumb.style.visibility = 'hidden'; }
  el.pPlay.textContent = '❚❚';
}

/* ---------------- イベント ---------------- */
el.venueSwitch.addEventListener('click', (e) => {
  const b = e.target.closest('[data-venue]'); if (!b) return;
  state.venue = b.dataset.venue;
  state.stages.clear(); state.genres.clear();
  stop();
});

el.daystrip.addEventListener('click', (e) => {
  const b = e.target.closest('[data-day]'); if (!b) return;
  state.day = b.dataset.day;
  state.stages.clear();
  stop();
});

el.stageFilter.addEventListener('click', (e) => {
  const b = e.target.closest('[data-stage]'); if (!b) return;
  const v = b.dataset.stage;
  if (state.stages.has(v)) state.stages.delete(v); else state.stages.add(v);
  render();
});
el.genreFilter.addEventListener('click', (e) => {
  const b = e.target.closest('[data-genre]'); if (!b) return;
  const v = b.dataset.genre;
  if (state.genres.has(v)) state.genres.delete(v); else state.genres.add(v);
  render();
});
el.viewFilter.addEventListener('click', (e) => {
  const b = e.target.closest('[data-view]'); if (!b) return;
  state.view = b.dataset.view;
  render();
});

let searchTimer = null;
el.search.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.q = el.search.value.trim(); render(); }, 180);
});

el.resetBtn.addEventListener('click', () => {
  state.q = ''; el.search.value = '';
  state.stages.clear(); state.genres.clear(); state.view = 'all';
  render();
});

el.grid.addEventListener('click', (e) => {
  const playBtn = e.target.closest('[data-play]');
  if (playBtn) {
    const id = playBtn.dataset.play, si = Number(playBtn.dataset.song);
    const cur = state.queue[state.qi];
    if (cur && cur.id === id && cur.songIndex === si) { togglePlay(); return; }
    state.continuous = false;
    buildQueue(id, si);
    render();
    playAt(0);
    return;
  }
  const more = e.target.closest('[data-more]');
  if (more) {
    const id = more.dataset.more;
    if (state.expanded.has(id)) state.expanded.delete(id); else state.expanded.add(id);
    render(); refreshPlayingUI();
    return;
  }
  const fav = e.target.closest('[data-fav]');
  if (fav) {
    const id = fav.dataset.fav;
    if (state.fav.has(id)) state.fav.delete(id); else state.fav.add(id);
    render(); refreshPlayingUI();
  }
});

el.grid.addEventListener('change', (e) => {
  const sel = e.target.closest('[data-status]'); if (!sel) return;
  state.status[sel.dataset.status] = sel.value;
  sel.dataset.v = sel.value;
  if (state.view !== 'all') { render(); refreshPlayingUI(); }
});

el.playAll.addEventListener('click', () => {
  if (state.continuous) { stop(); return; }
  const list = visibleList();
  if (!list.length) { toast('再生できるアーティストがいません'); return; }
  state.continuous = true;
  buildQueue(null, null);
  render();
  playAt(0);
});

el.shuffle.addEventListener('click', () => {
  state.shuffle = !state.shuffle;
  el.shuffle.setAttribute('aria-pressed', String(state.shuffle));
  toast(state.shuffle ? 'シャッフル：オン' : 'シャッフル：オフ');
});

el.volume.addEventListener('input', () => {
  state.volume = Number(el.volume.value);
  if (state.audio) state.audio.volume = state.volume;
});

$('#pPrev').addEventListener('click', prev);
$('#pNext').addEventListener('click', next);
el.pPlay.addEventListener('click', togglePlay);
$('#pClose').addEventListener('click', stop);

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, select, textarea')) return;
  if (e.code === 'Space' && state.queue.length) { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

/* ---------------- 起動 ---------------- */
el.daystrip.innerHTML = ['DAY1', 'DAY2', 'DAY3'].map((d) =>
  '<button class="daytab" role="tab" data-day="' + d + '" aria-selected="false">' +
  '<span class="d-no">' + d + '</span><span class="d-date">' + dayLabel[d] + '</span></button>').join('');

state.artists = Array.isArray(window.SS_ARTISTS) ? window.SS_ARTISTS : [];
render();

})();
</script>
</body>
</html>
