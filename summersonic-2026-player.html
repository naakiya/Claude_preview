<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>SUMMER SONIC 2026 TOKYO 予習プレイヤー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink:        #070A14;
  --panel:      #0E1322;
  --panel-2:    #161D31;
  --line:       rgba(255,255,255,.10);
  --line-soft:  rgba(255,255,255,.06);
  --text:       #EDF1FA;
  --dim:        #8892AB;
  --accent:     #FF6A3D;
  --accent-ink: #1A0A04;
  --radius:     14px;
  --radius-sm:  9px;
  --player-h:   74px;
  --font-display: 'Anton', 'Zen Kaku Gothic New', sans-serif;
  --font-body:    'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  --font-mono:    'DM Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
body[data-day="DAY1"] { --accent: #FF6A3D; --accent-ink: #200A03; }
body[data-day="DAY2"] { --accent: #4FB8FF; --accent-ink: #04121F; }
body[data-day="DAY3"] { --accent: #FFC94B; --accent-ink: #201704; }

* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--ink);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  padding-bottom: calc(var(--player-h) + 240px + env(safe-area-inset-bottom, 0px));
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0 0 auto 0;
  height: 340px;
  background: radial-gradient(120% 100% at 50% 0%, color-mix(in srgb, var(--accent) 26%, transparent) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  transition: background .5s ease;
}
.wrap { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 0 16px; }
button, select, input { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

.masthead { padding: 26px 0 8px; }
.wordmark {
  font-family: var(--font-display);
  font-size: clamp(30px, 8.5vw, 56px);
  line-height: .95;
  letter-spacing: .01em;
  text-transform: uppercase;
}
.wordmark em { font-style: normal; color: var(--accent); transition: color .4s ease; }
.tagline {
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: .16em;
  color: var(--dim);
  text-transform: uppercase;
}

.daystrip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 18px 0 20px; }
.daytab {
  position: relative;
  padding: 12px 10px 13px;
  text-align: left;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: background .2s, border-color .2s, transform .12s;
}
.daytab::after {
  content: '';
  position: absolute;
  right: 26px; top: -4px; bottom: -4px;
  width: 1px;
  background-image: radial-gradient(circle, rgba(255,255,255,.28) 1px, transparent 1.2px);
  background-size: 2px 7px;
  opacity: .5;
}
.daytab:active { transform: scale(.985); }
.daytab .d-no { display: block; font-family: var(--font-display); font-size: 20px; line-height: 1.1; letter-spacing: .02em; }
.daytab .d-date { display: block; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .08em; color: var(--dim); margin-top: 2px; }
.daytab[aria-selected="true"] { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.daytab[aria-selected="true"] .d-date { color: var(--accent-ink); opacity: .72; }
.daytab[aria-selected="true"]::after { background-image: radial-gradient(circle, rgba(0,0,0,.35) 1px, transparent 1.2px); }

.actionbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
.btn-primary {
  flex: 1 1 220px;
  min-height: 50px;
  padding: 0 18px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: var(--accent-ink);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: .02em;
  transition: filter .15s, transform .12s;
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active { transform: scale(.99); }
.btn-ghost {
  min-height: 50px;
  padding: 0 16px;
  border-radius: var(--radius-sm);
  background: var(--panel);
  border: 1px solid var(--line);
  color: var(--text);
  font-size: 14px;
}
.btn-ghost[aria-pressed="true"] { border-color: var(--accent); color: var(--accent); }
.volume-wrap {
  display: flex; align-items: center; gap: 8px;
  min-height: 50px; padding: 0 14px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 11px; color: var(--dim);
}
input[type="range"] { width: 92px; accent-color: var(--accent); }

.notice {
  display: none;
  margin: 0 0 14px;
  padding: 12px 14px;
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--accent) 12%, var(--panel));
  font-size: 13px;
  line-height: 1.9;
}
.notice.is-on { display: block; }
.notice b { color: var(--accent); }
.retry-btn {
  margin-top: 10px;
  padding: 9px 18px;
  min-height: 40px;
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  color: var(--accent);
  font-weight: 700;
  display: inline-block;
}

.searchrow { display: flex; gap: 8px; margin-bottom: 10px; }
.searchrow input[type="search"] {
  flex: 1;
  min-height: 46px;
  padding: 0 14px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--text);
}
.searchrow input[type="search"]::placeholder { color: var(--dim); }
.filter-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.chip {
  padding: 7px 13px;
  min-height: 36px;
  border-radius: 999px;
  background: var(--panel);
  border: 1px solid var(--line);
  color: var(--dim);
  font-size: 12.5px;
  transition: color .15s, border-color .15s, background .15s;
}
.chip[aria-pressed="true"] { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); font-weight: 500; }
.filter-label {
  align-self: center;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .14em;
  color: var(--dim);
  text-transform: uppercase;
  margin-right: 2px;
}
.resultline {
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: .08em;
  color: var(--dim);
  margin: 14px 0 10px;
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.linkish { color: var(--dim); text-decoration: underline; text-underline-offset: 3px; font-size: 11.5px; background: none; }
.linkish:hover { color: var(--text); }

.grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
@media (min-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1040px) { .grid { grid-template-columns: repeat(3, 1fr); } }
.card {
  position: relative;
  display: flex;
  flex-direction: column;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .2s, background .2s;
}
.card.is-playing { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 9%, var(--panel)); }
.card.is-headliner { border-color: color-mix(in srgb, var(--accent) 65%, var(--line)); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent); }
.hl-badge {
  display: inline-block;
  margin-right: 7px;
  padding: 1px 7px 2px;
  border-radius: 3px;
  background: var(--accent);
  color: var(--accent-ink);
  font-weight: 700;
  letter-spacing: .12em;
}
.card.is-playing::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
.card-head { display: flex; gap: 12px; padding: 12px; }
.thumb { flex: 0 0 68px; width: 68px; height: 68px; border-radius: 8px; background: var(--panel-2); object-fit: cover; display: block; }
.thumb-fallback {
  flex: 0 0 68px; width: 68px; height: 68px;
  border-radius: 8px;
  background: var(--panel-2);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--dim);
}
.card-meta { min-width: 0; flex: 1; }
.artist-name { font-size: 16px; font-weight: 700; line-height: 1.35; letter-spacing: .01em; word-break: break-word; }
.slot { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .07em; color: var(--dim); margin-top: 3px; text-transform: uppercase; }
.genres { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
.genre {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: .1em;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid var(--line);
  color: var(--dim);
}
.songs { border-top: 1px solid var(--line-soft); }
.song {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  min-height: 48px;
  text-align: left;
  border-bottom: 1px solid var(--line-soft);
  transition: background .15s;
}
.song:hover { background: rgba(255,255,255,.035); }
.song:last-child { border-bottom: none; }
.song.is-current .song-title { color: var(--accent); font-weight: 700; }
.song.is-dead .song-title { color: var(--dim); }
.song-icon {
  flex: 0 0 26px; width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 50%;
  border: 1px solid var(--line);
  font-size: 10px;
  color: var(--text);
}
.song.is-current .song-icon { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.song-title { flex: 1; min-width: 0; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-note { font-family: var(--font-mono); font-size: 10px; color: var(--dim); flex: 0 0 auto; }
.card-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 10px;
  border-top: 1px solid var(--line-soft);
  background: rgba(0,0,0,.18);
}
.fav {
  min-height: 38px; padding: 0 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  font-size: 13px; color: var(--dim);
  white-space: nowrap;
}
.fav[aria-pressed="true"] { color: var(--accent); border-color: var(--accent); }
.status-select {
  flex: 1; min-width: 0;
  min-height: 38px;
  padding: 0 26px 0 8px;
  border-radius: var(--radius-sm);
  background: var(--panel-2);
  border: 1px solid var(--line);
  font-size: 12.5px;
  color: var(--text);
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--dim) 50%), linear-gradient(135deg, var(--dim) 50%, transparent 50%);
  background-position: calc(100% - 15px) 17px, calc(100% - 11px) 17px;
  background-size: 4px 4px, 4px 4px;
  background-repeat: no-repeat;
}
.status-select[data-v="当日観たい"], .status-select[data-v="優先度高"] { border-color: var(--accent); color: var(--accent); }
.ext {
  min-height: 38px; min-width: 38px;
  display: grid; place-items: center;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  color: var(--dim);
  font-size: 13px;
  text-decoration: none;
}
.ext:hover { color: var(--text); border-color: var(--text); }
.empty {
  padding: 44px 16px;
  text-align: center;
  color: var(--dim);
  border: 1px dashed var(--line);
  border-radius: var(--radius);
}
.empty strong { display: block; color: var(--text); margin-bottom: 6px; font-size: 15px; }

/* ---------- 下部プレイヤー（動画 + コントロール） ---------- */
.miniplayer {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 40;
  background: rgba(10,14,26,.96);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  transform: translateY(110%);
  transition: transform .28s cubic-bezier(.2,.8,.3,1);
}
.miniplayer.is-open { transform: translateY(0); }
.video-shell { max-width: 560px; margin: 0 auto; padding: 8px 10px 0; }
.miniplayer.audio-mode #ytMount { display: none; }
#ytMount { width: 100%; aspect-ratio: 16 / 9; border-radius: 10px; overflow: hidden; background: #000; }
#ytMount iframe { width: 100%; height: 100%; display: block; }
.progress { height: 2px; background: rgba(255,255,255,.10); margin-top: 8px; }
.progress span { display: block; height: 100%; width: 0%; background: var(--accent); transition: width .25s linear; }
.mini-inner {
  display: flex; align-items: center; gap: 10px;
  height: calc(var(--player-h) - 2px);
  max-width: 1120px; margin: 0 auto; padding: 0 12px;
}
.mini-text { flex: 1; min-width: 0; }
.mini-artist { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-song { font-family: var(--font-mono); font-size: 10.5px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-controls { display: flex; align-items: center; gap: 2px; flex: 0 0 auto; }
.mini-controls button {
  width: 44px; height: 44px;
  display: grid; place-items: center;
  border-radius: 50%;
  color: var(--text);
  font-size: 15px;
}
.mini-controls button:hover { background: rgba(255,255,255,.07); }
.mini-controls .play { background: var(--accent); color: var(--accent-ink); font-size: 16px; }
.mini-controls .play:hover { filter: brightness(1.08); }
.mini-controls .close { color: var(--dim); font-size: 13px; }

.toast {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: calc(var(--player-h) + 230px + env(safe-area-inset-bottom, 0px));
  z-index: 60;
  padding: 9px 16px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12.5px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
  max-width: calc(100vw - 32px);
  text-align: center;
}
.toast.is-on { opacity: 1; }

footer {
  margin: 40px 0 10px;
  padding-top: 18px;
  border-top: 1px solid var(--line-soft);
  font-family: var(--font-mono);
  font-size: 10.5px;
  line-height: 2;
  letter-spacing: .05em;
  color: var(--dim);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}
</style>
</head>
<body data-day="DAY1">
<div class="wrap">

  <header class="masthead">
    <h1 class="wordmark">SUMMER SONIC <em>2026</em></h1>
    <p class="tagline">Tokyo — ZOZO Marine Stadium &amp; Makuhari Messe / 20 acts × 3 days</p>
  </header>

  <nav class="daystrip" id="daystrip" role="tablist" aria-label="日付"></nav>

  <div class="notice" id="envNote"></div>

  <div class="actionbar">
    <button class="btn-primary" id="playAll">▶ 連続再生</button>
    <button class="btn-ghost" id="shuffleBtn" aria-pressed="false">⤮ シャッフル</button>
    <label class="volume-wrap">VOL
      <input type="range" id="volume" min="0" max="100" step="5" value="90" aria-label="音量">
    </label>
  </div>

  <div class="searchrow">
    <input type="search" id="search" placeholder="アーティスト名・曲名で検索" aria-label="検索">
  </div>

  <div class="filter-group" id="viewFilter">
    <span class="filter-label">View</span>
    <button class="chip" data-view="all" aria-pressed="true">すべて</button>
    <button class="chip" data-view="fav" aria-pressed="false">★ 気になる</button>
    <button class="chip" data-view="unheard" aria-pressed="false">未聴のみ</button>
    <button class="chip" data-view="wanted" aria-pressed="false">当日観たい</button>
  </div>
  <div class="filter-group" id="stageFilter"></div>
  <div class="filter-group" id="genreFilter"></div>

  <div class="resultline">
    <span id="resultCount"></span>
    <button class="linkish" id="resetFilters">絞り込みをリセット</button>
  </div>

  <main class="grid" id="grid" aria-live="polite"></main>

  <footer>
    音源は30秒プレビュー（Apple / Deezer）を優先して再生し、見つからない曲だけYouTube動画（サビ付近〜約35秒）に切り替えます。<br>プレビューにはサビを含む聴きどころ部分が使われることが多いです。<br>
    出演情報は 2026/7/24 時点の公式発表から東京会場の主要20組×3日を抜粋。最新情報は summersonic.com でご確認ください。<br>
    player v10
  </footer>

</div>

<div class="miniplayer" id="miniplayer">
  <div class="video-shell">
    <div id="ytMount"></div>
    <div class="progress"><span id="pBar"></span></div>
  </div>
  <div class="mini-inner">
    <div class="mini-text">
      <div class="mini-artist" id="pArtist"></div>
      <div class="mini-song" id="pSong"></div>
    </div>
    <div class="mini-controls">
      <button id="pPrev" aria-label="前の曲">⏮</button>
      <button class="play" id="pPlay" aria-label="再生・一時停止">▶</button>
      <button id="pNext" aria-label="次の曲">⏭</button>
      <button class="close" id="pClose" aria-label="プレイヤーを閉じる">✕</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(() => {
'use strict';

/* =========================================================
   SUMMER SONIC 2026 TOKYO 予習プレイヤー v4
   - 曲探し: YouTube検索(複数ルート) → videoId
   - 再生: YouTube公式埋め込みプレーヤーでサビ付近を約35秒
   - お気に入り等はブラウザに保存(使えない環境ではメモリ保持)
   ========================================================= */

const STATUSES = ['未聴', '試聴済み', '当日観たい', '優先度高', '見送る'];
const GAP_MS = 800;

/* ---------- 保存(localStorageが使えない環境ではメモリ) ---------- */
const persist = (() => {
  try {
    const t = '__ss26_test__';
    window.localStorage.setItem(t, '1');
    window.localStorage.removeItem(t);
    return window.localStorage;
  } catch (e) { return null; }
})();
const mem = Object.create(null);
const store = {
  get(k, fallback) {
    try {
      if (persist) {
        const v = persist.getItem('ss26:' + k);
        return v == null ? fallback : JSON.parse(v);
      }
    } catch (e) {}
    return (k in mem) ? mem[k] : fallback;
  },
  set(k, v) {
    mem[k] = v;
    try { if (persist) persist.setItem('ss26:' + k, JSON.stringify(v)); } catch (e) {}
  },
};

const state = {
  artists: [],
  day: 'DAY1',
  q: '',
  stages: new Set(),
  genres: new Set(),
  view: 'all',
  fav: new Set(store.get('fav', [])),
  status: store.get('status', {}),
  volume: store.get('volume', 90),
  shuffle: false,
  queue: [],
  qi: -1,
  playing: false,
  continuous: false,
  segTimer: null,
  seg: null,           // { start, end } 再生中区間
  loadSeq: 0,
  cands: null,
  candIdx: 0,
  backend: 'yt',
  netBlocked: false,
};

const $ = (s) => document.querySelector(s);
const el = {
  daystrip:    $('#daystrip'),
  playAll:     $('#playAll'),
  shuffle:     $('#shuffleBtn'),
  volume:      $('#volume'),
  search:      $('#search'),
  stageFilter: $('#stageFilter'),
  genreFilter: $('#genreFilter'),
  viewFilter:  $('#viewFilter'),
  resultCount: $('#resultCount'),
  resetBtn:    $('#resetFilters'),
  grid:        $('#grid'),
  player:      $('#miniplayer'),
  pArtist:     $('#pArtist'),
  pSong:       $('#pSong'),
  pPlay:       $('#pPlay'),
  pBar:        $('#pBar'),
  toast:       $('#toast'),
  envNote:     $('#envNote'),
};

const esc = (s) => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

function norm(s) {
  return String(s || '').normalize('NFKC').toLowerCase().replace(/[^\p{L}\p{N}]+/gu, '');
}

let toastTimer = null;
function toast(msg) {
  el.toast.textContent = msg;
  el.toast.classList.add('is-on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.toast.classList.remove('is-on'), 3000);
}

const dayLabel = { DAY1: '08/14 FRI', DAY2: '08/15 SAT', DAY3: '08/16 SUN' };

/* =========================================================
   YouTubeの動画IDを探す
   ========================================================= */
function fetchT(u, ms) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error('timeout')), ms);
    fetch(u).then((r) => { clearTimeout(t); resolve(r); }, (err) => { clearTimeout(t); reject(err); });
  });
}

function noteNetworkOk() {
  if (!state.netBlocked) return;
  state.netBlocked = false;
  el.envNote.classList.remove('is-on');
}

function showBlockedNote() {
  state.netBlocked = true;
  el.envNote.innerHTML =
    '<b>YouTubeの検索に接続できませんでした。</b><br>' +
    '電波状況などで一時的に失敗することがあります。少し待って「再試行」を押すか、Wi-Fiとモバイル回線を切り替えてみてください。' +
    'Claudeアプリ内のプレビューで開いている場合は、仕様上再生できないため、このページのURLをSafariで開いてください。<br>' +
    '<button class="retry-btn" id="retryBtn">↻ 再試行</button>';
  el.envNote.classList.add('is-on');
  const b = document.getElementById('retryBtn');
  if (b) b.addEventListener('click', () => {
    el.envNote.classList.remove('is-on');
    state.netBlocked = false;
    if (!state.queue.length) { toast('聴きたい曲をタップしてください'); return; }
    playAt(state.qi >= 0 ? state.qi : 0);
  });
}

const ID_RE = /"videoId":"([A-Za-z0-9_-]{11})"/;

/* 検索語 → videoId候補(最大4件)。埋め込み値 → キャッシュ → 各ルートの順に試す */
async function resolveVideoIds(song) {
  if (song.videoId) return [song.videoId];

  const key = 'yt2:' + song.q;
  const cached = store.get(key, null);
  if (cached && cached.ids && cached.ids.length) return cached.ids;

  const q = song.q;
  const ytUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q) + '&sp=EgIQAQ%253D%253D';
  let ids = [];
  const push = (v) => { if (v && ids.indexOf(v) < 0) ids.push(v); };

  /* 1) Piped(YouTubeの非公式API)。軽くて速い */
  const piped = ['https://pipedapi.kavin.rocks', 'https://pipedapi.adminforge.de'];
  for (const base of piped) {
    if (ids.length) break;
    try {
      const r = await fetchT(base + '/search?q=' + encodeURIComponent(q) + '&filter=videos', 6000);
      if (!r.ok) continue;
      const j = await r.json();
      (j.items || []).forEach((x) => {
        if (x && x.type === 'stream' && typeof x.url === 'string' && x.url.indexOf('/watch?v=') === 0) {
          push(x.url.slice(9, 20));
        }
      });
    } catch (e) {}
  }

  /* 2) YouTubeの検索結果ページを中継サーバー経由で取得してIDを抜く */
  const proxies = [
    (u) => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
    (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    (u) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
  ];
  for (const p of proxies) {
    if (ids.length) break;
    try {
      const r = await fetchT(p(ytUrl), 10000);
      if (!r.ok) continue;
      const html = await r.text();
      const ms = html.match(/"videoId":"([A-Za-z0-9_-]{11})"/g) || [];
      ms.forEach((s) => push(s.slice(11, 22)));
    } catch (e) {}
  }

  ids = ids.slice(0, 4);
  if (ids.length) {
    noteNetworkOk();
    store.set(key, { ids: ids, ts: Date.now() });
  }
  return ids;
}

/* =========================================================
   YouTubeプレーヤー
   ========================================================= */
let yt = null;          // YT.Playerインスタンス
let ytLoadFailed = false;

const ytApiReady = new Promise((resolve) => {
  window.onYouTubeIframeAPIReady = () => resolve();
  setTimeout(() => {
    if (!(window.YT && window.YT.Player)) { ytLoadFailed = true; resolve(); }
  }, 8000);
});

function ensurePlayer() {
  return ytApiReady.then(() => new Promise((resolve) => {
    if (ytLoadFailed || !(window.YT && window.YT.Player)) { resolve(null); return; }
    if (yt) { resolve(yt); return; }
    yt = new YT.Player('ytMount', {
      width: '100%', height: '100%',
      playerVars: { playsinline: 1, rel: 0, controls: 1, modestbranding: 1, iv_load_policy: 3,
        origin: location.origin, widget_referrer: location.href },
      events: {
        onReady: () => { try { yt.setVolume(state.volume); } catch (e) {} resolve(yt); },
        onStateChange: onYtState,
        onError: onYtError,
      },
    });
  }));
}

function onYtState(ev) {
  if (!window.YT || state.backend !== 'yt') return;
  if (ev.data === YT.PlayerState.PLAYING) {
    state.playing = true;
    el.pPlay.textContent = '❚❚';
    refreshPlayingUI();
  } else if (ev.data === YT.PlayerState.PAUSED) {
    state.playing = false;
    el.pPlay.textContent = '▶';
    refreshPlayingUI();
  } else if (ev.data === YT.PlayerState.ENDED) {
    onSongEnd();
  }
}

function onYtError() {
  if (state.backend !== 'yt') return;
  const cur = state.queue[state.qi];
  if (cur && state.cands && state.candIdx + 1 < state.cands.length) {
    state.candIdx++;
    toast('別の動画で再試行しています…（' + (state.candIdx + 1) + '/' + state.cands.length + '）');
    try {
      yt.loadVideoById({ videoId: state.cands[state.candIdx], startSeconds: state.seg ? state.seg.start : 0 });
      yt.playVideo();
    } catch (e) {}
    return;
  }
  if (cur) {
    store.set('yt2:' + cur.entry.songs[cur.songIndex].q, null);
    finalDead(cur);
    return;
  }
  state.playing = false; el.pPlay.textContent = '▶';
}

/* ---------------- 30秒プレビュー音源(Apple / Deezer) ---------------- */
function jsonp(url, ms) {
  return new Promise((resolve, reject) => {
    const cb = 'ssjp_' + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    let done = false;
    const clean = () => { done = true; clearTimeout(t); try { delete window[cb]; } catch (e) { window[cb] = undefined; } s.remove(); };
    const t = setTimeout(() => { if (!done) { clean(); reject(new Error('timeout')); } }, ms || 8000);
    window[cb] = (d) => { if (!done) { clean(); resolve(d); } };
    s.onerror = () => { if (!done) { clean(); reject(new Error('network')); } };
    s.src = url + '&callback=' + cb;
    document.head.appendChild(s);
  });
}

const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
function unlockAudio() {
  const a = audioEl();
  if (a.dataset && a.dataset.unlocked) return;
  try { a.dataset.unlocked = '1'; } catch (e) {}
  try { a.src = SILENT_WAV; a.play().catch(() => {}); } catch (e) {}
}

let aud = null;
function audioEl() {
  if (aud) return aud;
  aud = new Audio();
  aud.preload = 'none';
  aud.volume = Math.max(0, Math.min(1, state.volume / 100));
  aud.addEventListener('timeupdate', () => {
    if (state.backend !== 'audio' || !state.seg) return;
    const end = Math.min(state.seg.end, isFinite(aud.duration) && aud.duration ? aud.duration : 30);
    const pct = Math.max(0, Math.min(100, (aud.currentTime / Math.max(1, end)) * 100));
    el.pBar.style.width = pct + '%';
    if (aud.currentTime >= end) { aud.pause(); onSongEnd(); }
  });
  aud.addEventListener('ended', () => { if (state.backend === 'audio' && state.playing) onSongEnd(); });
  aud.addEventListener('error', () => {
    if (state.backend !== 'audio' || !aud.src) return;
    const cur = state.queue[state.qi];
    if (cur) finalDead(cur);
  });
  return aud;
}
function stopAudio() {
  if (!aud) return;
  try { aud.pause(); aud.removeAttribute('src'); } catch (e) {}
}

async function resolvePreviewAny(entry, song) {
  const key = 'pv3:' + entry.artist + ' ' + song.title;
  const c = store.get(key, null);
  if (c && c.u) return c;
  if (c && c.u === null && Date.now() - c.ts < 3600000) return null;

  let sawEmpty = false;
  const nt = norm(song.title);
  const na = norm(entry.artist);
  const matchT = (tn) => { const t = norm(tn); return !!(t && nt && (t.includes(nt) || nt.includes(t))); };
  const matchA = (an) => { const a = norm(an); return !!(a && na && (a.includes(na) || na.includes(a))); };

  const itSearch = async (term, artistOnly) => {
    const u = 'https://itunes.apple.com/search?term=' + encodeURIComponent(term) +
              '&entity=song&limit=8&country=JP&media=music';
    const routes = [u,
      'https://corsproxy.io/?url=' + encodeURIComponent(u),
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
      'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u)];
    for (const r of routes) {
      try {
        const res = await fetchT(r, 8000);
        if (!res.ok) continue;
        const j = await res.json();
        const list = (j.results || []).filter((x) => x && x.kind === 'song' && x.previewUrl);
        sawEmpty = true;
        let hit;
        if (artistOnly) {
          hit = list.find((x) => matchA(x.artistName));
        } else {
          hit = list.find((x) => matchT(x.trackName) && matchA(x.artistName)) ||
                list.find((x) => matchA(x.artistName)) ||
                list.find((x) => matchT(x.trackName)) || list[0];
        }
        return hit ? { u: hit.previewUrl, name: hit.trackName || '' } : null;
      } catch (e) {}
    }
    return null;
  };

  const dzSearch = async (term, artistOnly) => {
    const u = 'https://api.deezer.com/search?q=' + encodeURIComponent(term) + '&limit=8';
    const parse = (j) => {
      const list = ((j && j.data) || []).filter((x) => x && x.preview);
      if (j && j.data) sawEmpty = true;
      let hit;
      if (artistOnly) {
        hit = list.find((x) => matchA(x.artist && x.artist.name));
      } else {
        hit = list.find((x) => matchT(x.title) && matchA(x.artist && x.artist.name)) ||
              list.find((x) => matchA(x.artist && x.artist.name)) ||
              list.find((x) => matchT(x.title)) || list[0];
      }
      return hit ? { u: hit.preview, name: hit.title || '' } : null;
    };
    try {
      const j = await jsonp(u + '&output=jsonp', 7000);
      const got = parse(j);
      if (got) return got;
    } catch (e) {}
    const routes = ['https://corsproxy.io/?url=' + encodeURIComponent(u),
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
      'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u)];
    for (const r of routes) {
      try {
        const res = await fetchT(r, 8000);
        if (!res.ok) continue;
        return parse(await res.json());
      } catch (e) {}
    }
    return null;
  };

  /* ① アーティスト名+曲名 → ② それでも無ければアーティスト名だけで探し、その人の曲を代わりに流す */
  let hit = await itSearch(entry.artist + ' ' + song.title, false);
  if (!hit) hit = await dzSearch(entry.artist + ' ' + song.title, false);
  if (!hit) hit = await itSearch(entry.artist, true);
  if (!hit) hit = await dzSearch(entry.artist, true);
  if (hit) {
    const rec = { u: hit.u, name: hit.name, ts: Date.now() };
    store.set(key, rec);
    return rec;
  }
  if (sawEmpty) store.set(key, { u: null, ts: Date.now() });
  return null;
}

async function playPreview(seq, cur) {
  const entry = cur.entry;
  const song = entry.songs[cur.songIndex];
  el.pSong.textContent = song.title + '（音源を探しています…）';
  const pv = await resolvePreviewAny(entry, song);
  if (seq !== state.loadSeq) return true;
  if (!pv || !pv.u) return false;
  const shown = (pv.name && norm(pv.name) !== norm(song.title)) ? pv.name : song.title;
  state.backend = 'audio';
  el.player.classList.add('audio-mode');
  try { if (yt) yt.stopVideo(); } catch (e) {}
  const a = audioEl();
  a.src = pv.u;
  state.seg = { start: 0, end: 31 };
  el.pBar.style.width = '0%';
  return a.play().then(() => {
    state.playing = true;
    el.pPlay.textContent = '❚❚';
    el.pSong.textContent = shown + '（30秒プレビュー）';
    refreshPlayingUI();
    return true;
  }).catch(() => {
    state.playing = false;
    el.pPlay.textContent = '▶';
    el.pSong.textContent = song.title + '（▶で再生）';
    toast('▶ボタンをタップすると再生されます');
    return true;
  });
}

function finalDead(cur) {
  cur.entry.songs[cur.songIndex]._dead = true;
  refreshPlayingUI();
  if (state.continuous) { toast('再生できないためスキップします'); onSongEnd(); }
  else {
    state.playing = false;
    el.pPlay.textContent = '▶';
    el.pSong.textContent = cur.entry.songs[cur.songIndex].title + '（再生不可）';
    toast('この曲は再生できませんでした。▶リンクからYouTubeで確認できます');
  }
}

/* 区間の終わりを監視 */
function startSegWatch() {
  clearInterval(state.segTimer);
  state.segTimer = setInterval(() => {
    if (state.backend !== 'yt' || !yt || !state.seg || !state.playing) return;
    let t = 0;
    try { t = yt.getCurrentTime() || 0; } catch (e) { return; }
    const { start, end } = state.seg;
    const pct = Math.max(0, Math.min(100, ((t - start) / Math.max(1, end - start)) * 100));
    el.pBar.style.width = pct + '%';
    if (t >= end) {
      try { yt.pauseVideo(); } catch (e) {}
      onSongEnd();
    }
  }, 400);
}

function onSongEnd() {
  if (state.continuous) {
    if (state.qi + 1 >= state.queue.length) { stop(); toast('この日の予習はここまでです'); return; }
    state.playing = false;
    setTimeout(() => playAt(state.qi + 1), GAP_MS);
  } else {
    el.pBar.style.width = '100%';
    state.playing = false;
    el.pPlay.textContent = '▶';
    refreshPlayingUI();
  }
}

/* =========================================================
   絞り込み・描画
   ========================================================= */
function visibleList() {
  const q = norm(state.q);
  return state.artists.filter((a) => {
    if (a.day !== state.day) return false;
    if (state.stages.size && !state.stages.has(a.stage)) return false;
    if (state.genres.size && !a.genre.some((g) => state.genres.has(g))) return false;
    const st = state.status[a.id] || '未聴';
    if (state.view === 'fav' && !state.fav.has(a.id)) return false;
    if (state.view === 'unheard' && st !== '未聴') return false;
    if (state.view === 'wanted' && st !== '当日観たい' && st !== '優先度高') return false;
    if (q && !norm(a.artist + a.stage + a.songs.map((s) => s.title).join('')).includes(q)) return false;
    return true;
  });
}

function renderDays() {
  el.daystrip.querySelectorAll('.daytab').forEach((b) => {

function renderFilterChips() {

    esc(g) + '</button>').join('');
  el.viewFilter.querySelectorAll('[data-view]').forEach((b) => {
    b.setAttribute('aria-pressed', String(b.dataset.view === state.view));

}

function cardHTML(a) {

      '<button class="fav" data-fav="' + esc(a.id) + '" aria-pressed="' + isFav + '">' + (isFav ? '★' : '☆') + ' 気になる</button>' +
      '<select class="status-select" data-status="' + esc(a.id) + '" data-v="' + esc(st) + '" aria-label="' + esc(a.artist) + 'の予習状況">' +
        STATUSES.map((s) => '<option' + (s === st ? ' selected' : '') + '>' + s + '</option>').join('') +
      '</select>' +

function render() {
  renderDays();
  renderFilterChips();
  const list = visibleList();
  const total = state.artists.filter((a) => a.day === state.day).length;
  el.resultCount.textContent = list.length + ' / ' + total + ' 組';
  el.playAll.textContent = state.continuous
    ? '■ 連続再生を停止'
    : '▶ ' + state.day + ' を連続再生（' + list.length + '組）';
  el.grid.innerHTML = list.length
    ? list.map(cardHTML).join('')
    : '<div class="empty"><strong>条件に合うアーティストがいません</strong>絞り込みを外すか、別の日付を選んでください。</div>';

  el.grid.querySelectorAll('img.thumb').forEach((img) => {

      const d = document.createElement('div');
      d.className = 'thumb-fallback';

      img.replaceWith(d);
    }, { once: true });
  });
}

function refreshPlayingUI() {
  const cur = state.queue[state.qi];
  document.querySelectorAll('.card').forEach((c) => c.classList.remove('is-playing'));
  document.querySelectorAll('.song').forEach((s) => {
    s.classList.remove('is-current');
    const icon = s.querySelector('.song-icon');
    if (icon) icon.textContent = '▶';
  });
  if (!cur) return;
  const card = document.getElementById('card-' + cur.id);
  if (card) {
    card.classList.add('is-playing');
    const song = card.querySelector('[data-song="' + cur.songIndex + '"]');
    if (song) {
      song.classList.add('is-current');
      const icon = song.querySelector('.song-icon');
      if (icon) icon.textContent = state.playing ? '❚❚' : '▶';
    }
  }
}

/* =========================================================
   再生キュー
   ========================================================= */
function buildQueue(startId, startSongIndex) {
  const list = visibleList();
  let q = list.map((entry) => ({ id: entry.id, songIndex: 0, entry }));
  if (state.shuffle) {
    for (let i = q.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = q[i]; q[i] = q[j]; q[j] = t;
    }
  }
  if (startId != null) {
    const idx = q.findIndex((x) => x.id === startId);
    if (idx >= 0) {
      q = state.shuffle
        ? [q[idx]].concat(q.filter((_, i) => i !== idx))
        : q.slice(idx).concat(q.slice(0, idx));
      q[0].songIndex = startSongIndex || 0;
    } else {
      const entry = state.artists.find((a) => a.id === startId);
      if (entry) q = [{ id: startId, songIndex: startSongIndex || 0, entry }].concat(q);
    }
  }
  state.queue = q;
  state.qi = -1;
}

async function playAt(index) {
  if (index < 0 || index >= state.queue.length) { stop(); return; }
  const seq = ++state.loadSeq;
  state.qi = index;
  const cur = state.queue[index];
  const entry = cur.entry;
  const song = entry.songs[cur.songIndex];

  if (song._dead) {
    song._dead = false;
    store.set('pv3:' + entry.artist + ' ' + song.title, { u: null, ts: 0 });
    store.set('yt2:' + song.q, null);
  }

  state.backend = 'none';
  stopAudio();
  el.player.classList.add('is-open');
  el.pArtist.textContent = entry.artist;
  el.pSong.textContent = song.title + '（探しています…）';
  el.pBar.style.width = '0%';
  refreshPlayingUI();

  /* ① まず30秒プレビュー音源(Apple/Deezer)。次の曲の分は裏で先読み */
  prefetchNext();
  const okAudio = await playPreview(seq, cur);
  if (seq !== state.loadSeq) return;
  if (okAudio) { markHeard(entry.id); return; }

  /* ② 見つからない曲だけYouTube動画に切り替え */
  el.pSong.textContent = song.title + '（動画を探しています…）';
  const player = await ensurePlayer();
  if (seq !== state.loadSeq) return;
  if (!player) { finalDead(cur); return; }
  state.backend = 'yt';
  el.player.classList.remove('audio-mode');

  const ids = await resolveVideoIds(song);
  if (seq !== state.loadSeq) return;
  if (!ids.length) {
    if (!navigatorOnlineGuess()) { showBlockedNote(); state.continuous = false; render(); return; }
    finalDead(cur);
    return;
  }

  const start = Math.max(0, Number(song.start) || 0);
  const dur = Math.max(10, Number(song.dur) || 35);
  state.seg = { start: start, end: start + dur };
  state.cands = ids;
  state.candIdx = 0;

  el.pSong.textContent = song.title;
  try {
    player.loadVideoById({ videoId: ids[0], startSeconds: start });
    player.playVideo();
    try { player.setVolume(state.volume); } catch (e) {}
  } catch (e) {}
  startSegWatch();
  markHeard(entry.id);

  /* iOSで自動再生がブロックされた場合の案内 */
  setTimeout(() => {
    if (seq !== state.loadSeq || state.backend !== 'yt' || !window.YT || !yt) return;
    let s = -1;
    try { s = yt.getPlayerState(); } catch (e) {}
    if (s !== YT.PlayerState.PLAYING && s !== YT.PlayerState.BUFFERING) {
      toast('始まらないときは下の動画を直接タップしてください');
    }
  }, 2200);
}

/* 連続再生を滑らかにするため、次の曲のIDを先に調べておく */
function prefetchNext() {
  const nx = state.queue[state.qi + 1];
  if (!nx) return;
  const s = nx.entry.songs[nx.songIndex];
  if (!s) return;
  resolvePreviewAny(nx.entry, s).catch(() => {});
}

function navigatorOnlineGuess() {
  try { return navigator.onLine !== false; } catch (e) { return true; }
}

function markHeard(id) {
  setTimeout(() => {
    if (!state.status[id] || state.status[id] === '未聴') {
      state.status[id] = '試聴済み';
      store.set('status', state.status);
      const sel = document.querySelector('[data-status="' + (window.CSS && CSS.escape ? CSS.escape(id) : id) + '"]');
      if (sel) { sel.value = '試聴済み'; sel.dataset.v = '試聴済み'; }
    }
  }, 4000);
}

function next() {
  if (state.qi + 1 >= state.queue.length) { toast('最後の曲です'); return; }
  playAt(state.qi + 1);
}
function prev() { playAt(Math.max(0, state.qi - 1)); }

function togglePlay() {
  if (state.qi < 0) return;
  if (state.backend === 'audio') {
    const a = audioEl();
    if (state.playing) { a.pause(); state.playing = false; el.pPlay.textContent = '▶'; }
    else if (a.src) {
      a.play().then(() => { state.playing = true; el.pPlay.textContent = '❚❚'; refreshPlayingUI(); }).catch(() => {});
    }
    refreshPlayingUI();
    return;
  }
  if (!yt) return;
  try {
    if (state.playing) yt.pauseVideo();
    else yt.playVideo();
  } catch (e) {}
}

function stop() {
  state.loadSeq++;
  clearInterval(state.segTimer);
  state.seg = null;
  stopAudio();
  state.backend = 'yt';
  try { if (yt) yt.stopVideo(); } catch (e) {}
  state.playing = false;
  state.continuous = false;
  state.qi = -1;
  el.pPlay.textContent = '▶';
  el.pBar.style.width = '0%';
  el.player.classList.remove('is-open');
  refreshPlayingUI();
  render();
}

/* =========================================================
   イベント
   ========================================================= */
el.daystrip.addEventListener('click', (e) => {
  const b = e.target.closest('[data-day]'); if (!b) return;
  state.day = b.dataset.day;
  state.stages.clear();
  stop();
});

el.stageFilter.addEventListener('click', (e) => {
  const b = e.target.closest('[data-stage]'); if (!b) return;
  const v = b.dataset.stage;
  if (state.stages.has(v)) state.stages.delete(v); else state.stages.add(v);
  render();
});
el.genreFilter.addEventListener('click', (e) => {
  const b = e.target.closest('[data-genre]'); if (!b) return;
  const v = b.dataset.genre;
  if (state.genres.has(v)) state.genres.delete(v); else state.genres.add(v);
  render();
});
el.viewFilter.addEventListener('click', (e) => {
  const b = e.target.closest('[data-view]'); if (!b) return;
  state.view = b.dataset.view;
  render();
});

let searchTimer = null;
el.search.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.q = el.search.value.trim(); render(); }, 180);
});

el.resetBtn.addEventListener('click', () => {
  state.q = ''; el.search.value = '';
  state.stages.clear(); state.genres.clear(); state.view = 'all';
  render();
});

el.grid.addEventListener('click', (e) => {
  const playBtn = e.target.closest('[data-play]');
  if (playBtn) {
    const id = playBtn.dataset.play, si = Number(playBtn.dataset.song);
    const cur = state.queue[state.qi];
    if (cur && cur.id === id && cur.songIndex === si) { togglePlay(); return; }
    state.continuous = false;
    unlockAudio();
    ensurePlayer();
    buildQueue(id, si);
    render();
    playAt(0);
    return;
  }
  const fav = e.target.closest('[data-fav]');
  if (fav) {
    const id = fav.dataset.fav;
    if (state.fav.has(id)) state.fav.delete(id); else state.fav.add(id);
    store.set('fav', [...state.fav]);
    render(); refreshPlayingUI();
  }
});

el.grid.addEventListener('change', (e) => {
  const sel = e.target.closest('[data-status]'); if (!sel) return;
  state.status[sel.dataset.status] = sel.value;
  sel.dataset.v = sel.value;
  store.set('status', state.status);
  if (state.view !== 'all') { render(); refreshPlayingUI(); }
});

el.playAll.addEventListener('click', () => {
  if (state.continuous) { stop(); return; }
  const list = visibleList();
  if (!list.length) { toast('再生できるアーティストがいません'); return; }
  state.continuous = true;
  unlockAudio();
  ensurePlayer();
  buildQueue(null, null);
  render();
  playAt(0);
});

el.shuffle.addEventListener('click', () => {
  state.shuffle = !state.shuffle;
  el.shuffle.setAttribute('aria-pressed', String(state.shuffle));
  toast(state.shuffle ? 'シャッフル：オン' : 'シャッフル：オフ');
});

el.volume.addEventListener('input', () => {
  state.volume = Number(el.volume.value);
  store.set('volume', state.volume);
  try { if (yt) yt.setVolume(state.volume); } catch (e) {}
  try { if (aud) aud.volume = Math.max(0, Math.min(1, state.volume / 100)); } catch (e) {}
});

$('#pPrev').addEventListener('click', prev);
$('#pNext').addEventListener('click', next);
el.pPlay.addEventListener('click', togglePlay);
$('#pClose').addEventListener('click', stop);

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, select, textarea')) return;
  if (e.code === 'Space' && state.queue.length) { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

/* ---------------- 起動 ---------------- */
el.daystrip.innerHTML = ['DAY1', 'DAY2', 'DAY3'].map((d) =>
  '<button class="daytab" role="tab" data-day="' + d + '" aria-selected="false">' +
  '<span class="d-no">' + d + '</span><span class="d-date">' + dayLabel[d] + '</span></button>').join('');

el.volume.value = state.volume;
state.artists = Array.isArray(window.SS_ARTISTS) ? window.SS_ARTISTS : [];
render();

/* YouTube IFrame API を読み込む */
(function loadYT() {
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  s.onerror = () => { ytLoadFailed = true; };
  document.head.appendChild(s);
})();

})();
</script>
</body>
</html>
